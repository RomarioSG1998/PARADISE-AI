services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_paradise
    restart: unless-stopped
    network_mode: "host"
    env_file:
      - .env
    volumes:
      # Persists the SQLite database across restarts
      - db_data:/app/data
      # Syncs .env file between host and container to persist cookie updates
      - ./.env:/app/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  db_data:
